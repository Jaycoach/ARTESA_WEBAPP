# Upstream para la aplicación Node.js
upstream artesa_app {
    server app:3000;
    keepalive 32;
}

# Variables para CORS dinámico
map $http_origin $cors_origin {
    default "https://app.artesapanaderia.com";
    "~^https://app\.artesapanaderia\.com$" "https://app.artesapanaderia.com";
    "~^https://d1e3k32ekxik37\.cloudfront\.net$" "https://d1e3k32ekxik37.cloudfront.net";
    "~^https://.*\.cloudfront\.net$" $http_origin;
    "~^http://localhost:3000$" "http://localhost:3000";
    "~^http://localhost:5173$" "http://localhost:5173";
}

map $cors_origin $cors_cred {
    default "true";
}

resolver 127.0.0.11 valid=30s;

# ========================================
# SERVIDOR HTTP (Puerto 80) — Redirect a HTTPS
# ========================================
server {
    listen 80;
    server_name api.artesapanaderia.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ========================================
# SERVIDOR HTTPS (Puerto 443)
# ========================================
server {
    listen 443 ssl http2;
    server_name api.artesapanaderia.com;

    # Certificados Let's Encrypt
    ssl_certificate /etc/letsencrypt/live/api.artesapanaderia.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.artesapanaderia.com/privkey.pem;

    # Configuración SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Headers de seguridad
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    server_tokens off;

    access_log /var/log/nginx/ssl_access.log;
    error_log /var/log/nginx/ssl_error.log;

    # ========================================
    # BLOQUEAR ARCHIVOS SENSIBLES
    # ========================================
    location ~ /\.(env|git|config) {
        deny all;
        return 404;
    }

    location ~ \.(json|md|yml|yaml)$ {
        if ($uri = "/swagger.json") {
            break;
        }
        deny all;
        return 404;
    }

    location ~ ^/(node_modules|src|config|scripts|docker|logs|ssl)/ {
        deny all;
        return 404;
    }

    location ~ \.(bak|backup|tmp|temp|log|cache)$ {
        deny all;
        return 404;
    }

    # ========================================
    # HEALTH CHECK
    # ========================================
    location = /api/health {
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Credentials $cors_cred always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, cache-control, g-recaptcha-response, recaptchatoken" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH, HEAD" always;

        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Credentials $cors_cred always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, cache-control, g-recaptcha-response, recaptchatoken" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH, HEAD" always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Type "text/plain charset=UTF-8" always;
            add_header Content-Length 0 always;
            return 204;
        }

        proxy_pass http://artesa_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ========================================
    # API PRINCIPAL
    # ========================================
    location /api/ {
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Credentials $cors_cred always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, cache-control, g-recaptcha-response, recaptchatoken, bypass-tunnel-reminder, ngrok-skip-browser-warning, dnt, sec-ch-ua, sec-ch-ua-mobile, sec-ch-ua-platform" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH, HEAD" always;
        add_header Access-Control-Max-Age 86400 always;

        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Credentials $cors_cred always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, cache-control, g-recaptcha-response, recaptchatoken, bypass-tunnel-reminder, ngrok-skip-browser-warning, dnt, sec-ch-ua, sec-ch-ua-mobile, sec-ch-ua-platform" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH, HEAD" always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Type "text/plain charset=UTF-8" always;
            add_header Content-Length 0 always;
            return 204;
        }

        proxy_pass http://artesa_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        client_max_body_size 50M;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_max_temp_file_size 0;
    }

    # ========================================
    # SWAGGER
    # ========================================
    location /api-docs {
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Credentials $cors_cred always;

        proxy_pass http://artesa_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
